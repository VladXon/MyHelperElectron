name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            HelperDesktop.server/package-lock.json
            HelperDesktop.io/package-lock.json
            HelperDesktop.telegram/package-lock.json
      - name: Install server deps
        working-directory: HelperDesktop.server
        run: npm ci
      - name: Install io deps
        working-directory: HelperDesktop.io
        run: npm ci
      - name: Install telegram deps
        working-directory: HelperDesktop.telegram
        run: npm ci
      - name: Typecheck server
        working-directory: HelperDesktop.server
        run: npx tsc --noEmit
      - name: Typecheck telegram
        working-directory: HelperDesktop.telegram
        run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            HelperDesktop.server/package-lock.json
            HelperDesktop.io/package-lock.json
            HelperDesktop.telegram/package-lock.json
      - name: Install deps
        run: |
          cd HelperDesktop.server && npm ci
          cd ../HelperDesktop.io && npm ci
          cd ../HelperDesktop.telegram && npm ci
      - name: Lint
        working-directory: HelperDesktop.server
        run: npx tsc --noEmit 2>&1 || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            HelperDesktop.server/package-lock.json
            HelperDesktop.io/package-lock.json
            HelperDesktop.telegram/package-lock.json
      - name: Install server deps
        working-directory: HelperDesktop.server
        run: npm ci
      - name: Install io deps
        working-directory: HelperDesktop.io
        run: npm ci
      - name: Install telegram deps
        working-directory: HelperDesktop.telegram
        run: npm ci
      - name: Delete old DB
        working-directory: HelperDesktop.server
        run: rm -f helperdesktop.db helperdesktop.db-wal helperdesktop.db-shm
      - name: Run tests
        working-directory: HelperDesktop.server
        run: npx vitest run

  build:
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            HelperDesktop.server/package-lock.json
            HelperDesktop.io/package-lock.json
      - name: Install server deps
        working-directory: HelperDesktop.server
        run: npm ci
      - name: Install io deps
        working-directory: HelperDesktop.io
        run: npm ci
      - name: Build server
        working-directory: HelperDesktop.server
        run: npx tsc
      - name: Build client
        working-directory: HelperDesktop.io
        run: npm run make -- --no-deps 2>/dev/null || echo "Skip make on non-Windows"
      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: HelperDesktop.server/dist/
      - name: Upload io build
        uses: actions/upload-artifact@v4
        with:
          name: io-dist
          path: HelperDesktop.io/out/
